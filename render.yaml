services:
  - type: web
    name: uk-gov-mcp
    runtime: docker
    dockerCommand: node dist/http-server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: sqlite:./standards.db
      - key: DB_PATH
        value: /app/standards.db
      - key: LOG_LEVEL
        value: info