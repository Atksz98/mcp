services:
  # UK Gov Tech Standards - HTTP API Server
  uk-gov-standards-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uk-gov-standards-mcp
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./models:/app/models
      - ./.env:/app/.env:ro
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
      - DB_PATH=/app/data/standards.db
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    depends_on:
      - chromadb
    networks:
      - mcp-network
    command: ["node", "dist/http-server.js"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # MCP SSE Proxy — wraps stdio MCP into SSE for Copilot Chat
  mcp-sse:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uk-gov-mcp-sse
    restart: unless-stopped
    ports:
      - "3000:3000"
    user: root
    volumes:
      - ./standards.db:/app/standards.db
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
      - DB_PATH=/app/standards.db
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    depends_on:
      - chromadb
    networks:
      - mcp-network
    command: >
      sh -c "npm install -g supergateway &&
             supergateway --port 3000 --stdio 'node /app/dist/index.js'"

  # ChromaDB for vector storage (semantic search)
  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    environment:
      - CHROMA_SERVER_CORS_ALLOW_ORIGINS=["*"]
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_PORT=8000
    networks:
      - mcp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  chromadb_data:
    driver: local

networks:
  mcp-network:
    driver: bridge